[pytest]
minversion = 8.0
testpaths = tests/game
python_files = test_*.py
asyncio_mode = auto
addopts = -q --strict-markers --strict-config --confcutdir=tests --rootdir=tests
markers =
    unit: 单元测试
    room_flow: 房间流程测试
    character: 角色测试
    spec_expected: 规范期望测试（可能先 xfail）
    known_issue: 已知问题行为锁定测试
